<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Status Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 50px; }
        .card { background: #1e293b; border-radius: 12px; padding: 30px; display: inline-block; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 400px; width: 100%; border: 1px solid #334155; }
        .status-badge { background-color: #22c55e; color: #052e16; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        p { color: #94a3b8; }
        .metric { font-size: 1.2rem; margin: 20px 0; font-family: monospace; color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cloud System Status</h1>
        <p>Automated DevOps Monitoring Panel</p>
        <hr style="border-color: #334155; margin: 20px 0;">
        
        <p>Operational Status: <span class="status-badge">ONLINE</span></p>
        
        <div class="metric">
            💻 Server Load: 14% <br>
            💾 Memory Available: 93%
        </div>
        
        <small style="color: #64748b;">Last System Check: 2026-06-30 17:39:48</small>
    </div>
</body>
</html>
